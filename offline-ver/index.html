<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#05070a">
  <title>Взлом Перикота</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070a;
      --panel: rgba(15, 23, 42, 0.74);
      --panel-strong: rgba(2, 6, 23, 0.92);
      --cyan: #00bcd4;
      --cyan-soft: rgba(0, 188, 212, 0.2);
      --green: #00e676;
      --red: #ff1744;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --line: rgba(255, 255, 255, 0.1);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      touch-action: manipulation;
      user-select: none;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    .app {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: calc(14px + var(--safe-top)) 14px calc(14px + var(--safe-bottom));
      overflow: hidden;
      isolation: isolate;
    }

    .grid-bg,
    .radial-bg,
    .scanline,
    .crt {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .grid-bg {
      background-image:
        linear-gradient(rgba(0, 188, 212, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 188, 212, 0.055) 1px, transparent 1px);
      background-size: 30px 30px;
      mask-image: radial-gradient(circle at center, black, transparent 82%);
    }

    .radial-bg {
      background:
        radial-gradient(circle at 50% 42%, rgba(0, 188, 212, 0.11), transparent 55%),
        linear-gradient(180deg, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.32));
    }

    .scanline {
      z-index: 4;
      height: 100px;
      opacity: 0.12;
      background: linear-gradient(0deg, transparent, rgba(0, 188, 212, 0.16), transparent);
      animation: scanline 10s linear infinite;
    }

    .crt {
      z-index: 3;
      opacity: 0.04;
      background:
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.28) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 2px, 3px 100%;
    }

    .top-line {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0, 188, 212, 0.78), transparent);
      animation: pulse 3s ease-in-out infinite;
    }

    .screen {
      width: min(100%, 430px);
      min-width: 0;
      max-height: 100%;
      display: grid;
      gap: 18px;
      justify-items: center;
      text-align: center;
      animation: enter 240ms ease-out both;
    }

    .panel {
      width: min(100%, 430px);
      max-height: calc(100vh - 28px - var(--safe-top) - var(--safe-bottom));
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(14px);
    }

    .idle {
      width: 100%;
      padding: 10px 6px;
      overflow: hidden;
    }

    .core {
      position: relative;
      width: 116px;
      height: 116px;
      display: grid;
      place-items: center;
      margin: 0 auto 20px;
      border: 1px solid rgba(0, 188, 212, 0.24);
      border-radius: 50%;
      animation: float 5s ease-in-out infinite;
    }

    .core::before,
    .core::after {
      content: "";
      position: absolute;
      inset: -10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 50%;
    }

    .core::after {
      inset: 0;
      border-color: transparent;
      border-top-color: var(--cyan);
      animation: spin 15s linear infinite;
    }

    .chip {
      width: 42px;
      height: 42px;
      position: relative;
      border: 3px solid var(--cyan);
      border-radius: 9px;
      box-shadow: 0 0 18px rgba(0, 188, 212, 0.46);
    }

    .chip::before,
    .chip::after {
      content: "";
      position: absolute;
      inset: 9px;
      border: 2px solid rgba(0, 188, 212, 0.72);
      border-radius: 4px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      width: 100%;
      max-width: 360px;
      font-size: clamp(34px, 12.2vw, 50px);
      line-height: 0.94;
      font-weight: 950;
      letter-spacing: 0;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    h1 span,
    .cyan {
      color: var(--cyan);
    }

    h1 span {
      display: block;
    }

    .subtitle {
      margin-top: 10px;
      color: rgba(0, 188, 212, 0.76);
      font: 700 10px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .primary {
      position: relative;
      width: min(calc(100vw - 36px), 320px);
      min-height: 56px;
      margin-top: 24px;
      padding: 16px 18px;
      overflow: hidden;
      border-radius: 10px;
      background: var(--cyan);
      color: #020617;
      font-weight: 950;
      font-size: 13px;
      line-height: 1.15;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      box-shadow: 0 0 24px rgba(0, 188, 212, 0.28);
    }

    .primary:active,
    .download-link:active,
    .round:active,
    .ghost:active {
      transform: scale(0.97);
    }

    .download-link {
      display: inline-grid;
      place-items: center;
      width: min(calc(100vw - 36px), 220px);
      min-height: 44px;
      margin-top: 10px;
      border: 1px solid rgba(0, 188, 212, 0.34);
      border-radius: 10px;
      background: rgba(0, 188, 212, 0.08);
      color: var(--cyan);
      font-weight: 950;
      font-size: 12px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .status-row {
      width: 100%;
      margin-top: 18px;
      display: grid;
      gap: 8px;
      color: #64748b;
      font: 700 9px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .boot {
      padding: 22px;
      text-align: left;
    }

    .boot > * {
      width: 100%;
    }

    .boot-head,
    .game-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      color: var(--muted);
      font: 800 10px/1.3 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .bar {
      width: 100%;
      height: 14px;
      margin: 12px 0 18px;
      overflow: hidden;
      border-radius: 99px;
      background: #0f172a;
      border: 1px solid rgba(0, 188, 212, 0.18);
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.42), 0 0 18px rgba(0, 188, 212, 0.08);
    }

    .bar-fill {
      height: 100%;
      width: 0;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.18), transparent 36%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.18) 0 6px, transparent 6px 13px),
        var(--cyan);
      box-shadow: 0 0 12px var(--cyan);
      transition: width 180ms ease-out;
    }

    .boot-progress {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: -8px;
      margin-bottom: 14px;
      color: rgba(0, 188, 212, 0.82);
      font: 800 10px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .log {
      display: grid;
      gap: 8px;
      color: #748094;
      font: 700 10px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-transform: uppercase;
    }

    .hint {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      padding: 12px;
      border: 1px solid rgba(0, 188, 212, 0.14);
      border-radius: 12px;
      background: rgba(0, 188, 212, 0.055);
      color: #a7b4c8;
      font-size: 12px;
      line-height: 1.45;
    }

    .game {
      display: grid;
      gap: 16px;
      padding: 14px;
      touch-action: pan-y;
      justify-items: stretch;
    }

    .game > * {
      width: 100%;
      min-width: 0;
    }

    .game-head {
      align-items: center;
      padding: 2px 2px 12px;
    }

    .danger {
      color: var(--red);
      animation: pulse 0.8s ease-in-out infinite;
    }

    .label {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      color: #a7b4c8;
      font: 900 9px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .label::before,
    .label::after {
      content: "";
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 188, 212, 0.24));
    }

    .label::after {
      background: linear-gradient(90deg, rgba(0, 188, 212, 0.24), transparent);
    }

    .matrix-wrap {
      width: max-content;
      margin: 8px auto 0;
      padding: 6px;
      border-radius: 12px;
      background: rgba(2, 6, 23, 0.82);
    }

    .matrix {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 3px;
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.58);
    }

    .target-cell {
      width: clamp(32px, 9.1vw, 42px);
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.025);
      transition: background 180ms ease, border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    .target-cell.on {
      background: #fff;
      border-color: #fff;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.14);
    }

    .target-cell.fill {
      background: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 18px rgba(0, 230, 118, 0.55);
      transform: scale(1.04);
    }

    .target-cell.overlap {
      background: var(--red);
      border-color: var(--red);
      box-shadow: 0 0 18px rgba(255, 23, 68, 0.55);
      transform: scale(1.04);
    }

    .selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      row-gap: 8px;
      column-gap: 12px;
      margin-top: 8px;
      margin-bottom: 10px;
      overflow: hidden;
      width: 100%;
      min-width: 0;
    }

    .round {
      position: relative;
      z-index: 3;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--cyan);
      font-size: 26px;
      line-height: 1;
    }

    .selector .round:first-child {
      grid-column: 1;
      grid-row: 2;
      justify-self: end;
      margin-right: 8px;
    }

    .selector .round:last-child {
      grid-column: 2;
      grid-row: 2;
      justify-self: start;
      margin-left: 8px;
    }

    .round:disabled {
      opacity: 0.25;
    }

    .carousel {
      position: relative;
      grid-column: 1 / -1;
      grid-row: 1;
      height: 142px;
      min-width: 0;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .module {
      position: absolute;
      z-index: 1;
      width: 112px;
      height: 112px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 3px;
      padding: 6px;
      border-radius: 12px;
      border: 1px solid rgba(0, 188, 212, 0.28);
      background: #0f172a;
      transition: transform 220ms ease, opacity 220ms ease, filter 220ms ease;
    }

    .module.prev {
      transform: translateX(-84px) scale(0.66);
      opacity: 0.5;
      filter: none;
    }

    .module.next {
      transform: translateX(84px) scale(0.66);
      opacity: 0.5;
      filter: none;
    }

    .module-cell {
      border-radius: 2px;
      background: transparent;
    }

    .module-cell.on {
      background: var(--cyan);
      box-shadow: 0 0 10px rgba(0, 188, 212, 0.38);
    }

    .counter {
      position: absolute;
      top: 0;
      right: 0;
      padding: 4px 7px;
      border-left: 1px solid rgba(255, 255, 255, 0.07);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 0 0 0 9px;
      background: rgba(2, 6, 23, 0.88);
      color: rgba(0, 188, 212, 0.7);
      font: 800 9px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 4px;
    }

    .dot {
      width: 8px;
      height: 3px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.12);
      transition: width 180ms ease, background 180ms ease;
    }

    .dot.active {
      width: 22px;
      background: var(--cyan);
    }

    .feedback {
      position: absolute;
      left: 50%;
      top: 47%;
      z-index: 8;
      max-width: calc(100vw - 36px);
      transform: translate(-50%, -50%);
      padding: 10px 14px;
      border: 2px solid;
      border-radius: 10px;
      background: #020617;
      font: 950 12px/1.25 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      box-shadow: 0 0 70px rgba(0, 0, 0, 0.9);
      animation: pop 180ms ease-out both;
    }

    .success-text {
      color: var(--green);
      border-color: var(--green);
    }

    .error-text {
      color: var(--red);
      border-color: var(--red);
    }

    .footer-note {
      padding-top: 2px;
      color: #64748b;
      font: 700 10px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-transform: uppercase;
    }

    .result-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
      background: rgba(2, 6, 23, 0.94);
      backdrop-filter: blur(16px);
      animation: enter 180ms ease-out both;
    }

    .result {
      width: min(calc(100vw - 64px), 360px);
      max-width: calc(100vw - 64px);
      max-height: calc(100vh - 32px - var(--safe-top) - var(--safe-bottom));
      overflow: hidden;
      padding: 22px 16px;
      display: grid;
      gap: 14px;
      justify-items: stretch;
      text-align: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.42);
    }

    .result > * {
      min-width: 0;
    }

    .result-icon {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      justify-self: center;
      border: 1px solid currentColor;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      font-size: 36px;
    }

    .result h2 {
      width: 100%;
      max-width: 100%;
      font-size: clamp(18px, 5.8vw, 28px);
      line-height: 1.04;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-all;
    }

    .result h2 span {
      display: block;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-all;
    }

    .result p {
      width: 100%;
      max-width: 100%;
      color: #94a3b8;
      font: 800 9px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      overflow-wrap: anywhere;
      word-break: break-all;
    }

    .ghost {
      width: 100%;
      max-width: 100%;
      min-height: 54px;
      padding: 14px 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #cbd5e1;
      font-weight: 950;
      font-size: 10px;
      line-height: 1.25;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-all;
    }

    .shake {
      animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
    }

    .hidden {
      display: none !important;
    }

    @media (max-height: 700px) {
      .app {
        padding-top: calc(8px + var(--safe-top));
        padding-bottom: calc(8px + var(--safe-bottom));
      }

      .screen,
      .game {
        gap: 11px;
      }

      .core {
        width: 92px;
        height: 92px;
        margin-bottom: 14px;
      }

      .chip {
        width: 34px;
        height: 34px;
      }

      h1 {
        font-size: clamp(31px, 11vw, 44px);
      }

      .primary {
        margin-top: 18px;
        min-height: 50px;
        padding: 13px 14px;
      }

      .target-cell {
        width: clamp(28px, 8.2vw, 36px);
      }

      .carousel {
        height: 118px;
      }

      .module {
        width: 92px;
        height: 92px;
      }

      .module.prev {
        transform: translateX(-70px) scale(0.64);
      }

      .module.next {
        transform: translateX(70px) scale(0.64);
      }

      .footer-note {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(12px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fill {
      to { width: 100%; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.9; }
    }

    @keyframes scanline {
      from { transform: translateY(-110px); }
      to { transform: translateY(calc(100vh + 110px)); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pop {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      15% { transform: translate(-5px, -3px); }
      30% { transform: translate(5px, 2px); }
      45% { transform: translate(-4px, 4px); }
      60% { transform: translate(4px, -3px); }
      75% { transform: translate(-2px, 2px); }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <div class="grid-bg"></div>
    <div class="radial-bg"></div>
    <div class="crt"></div>
    <div class="scanline"></div>
    <div class="top-line"></div>
  </main>

  <script>
    (() => {
      "use strict";

      const templates = [
        "101101001010111001011011101001011011",
        "011001111010110110101101011110101100",
        "111000101110011100111001011101000111",
        "001100110110011111100110110011001100",
        "101010111111010101101010010101111111",
        "110111110111101101111111011110111101",
        "011011011011000000111111011011011011",
        "111111100001101111011011100001111111",
        "101010110110011111101101101101101010",
        "011001011010110110101101101001101100"
      ];

      const modules = templates.map((item) => item.split("").map((cell) => cell === "1"));
      const app = document.getElementById("app");

      const state = {
        screen: "idle",
        level: 0,
        totalLevels: 3,
        timeLeft: 15,
        currentIndex: 0,
        target: [],
        applied: null,
        checking: false,
        timer: null,
        bootTimer: null,
        audio: null,
        touchX: 0
      };

      function sound(freq, type, duration, volume = 0.08) {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          if (!state.audio) state.audio = new AudioContext();
          const ctx = state.audio;
          if (ctx.state === "suspended") ctx.resume();

          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          gain.gain.setValueAtTime(volume, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + duration);
        } catch (error) {
          // Audio is optional; some mobile browsers block it until a tap.
        }
      }

      const sfx = {
        click: () => sound(800, "sine", 0.09, 0.045),
        select: () => sound(420, "square", 0.045, 0.022),
        success: () => {
          sound(600, "sine", 0.16, 0.09);
          setTimeout(() => sound(850, "sine", 0.24, 0.08), 90);
        },
        error: () => sound(150, "sawtooth", 0.32, 0.08),
        boot: () => {
          sound(110, "sine", 0.8, 0.12);
          setTimeout(() => sound(210, "sine", 0.7, 0.08), 420);
        },
        glitch: () => {
          for (let i = 0; i < 5; i += 1) {
            setTimeout(() => sound(140 + Math.random() * 850, i % 2 ? "square" : "sawtooth", 0.045, 0.045), i * 42);
          }
        }
      };

      function clearGameTimer() {
        if (state.timer) {
          clearInterval(state.timer);
          state.timer = null;
        }
      }

      function clearBootTimer() {
        if (state.bootTimer) {
          clearInterval(state.bootTimer);
          state.bootTimer = null;
        }
      }

      function render(shell) {
        app.querySelectorAll(".screen, .result-overlay").forEach((node) => node.remove());
        app.insertAdjacentHTML("beforeend", shell);
        bindControls();
      }

      function renderIdle() {
        clearGameTimer();
        clearBootTimer();
        state.screen = "idle";
        state.level = 0;
        state.timeLeft = 15;
        state.checking = false;
        state.applied = null;

        render(`
          <section class="screen idle" aria-label="Стартовый экран">
            <div>
              <div class="core" aria-hidden="true"><div class="chip"></div></div>
              <h1>Взлом<span>_Перикота</span></h1>
              <p class="subtitle">Система 9.4.0 // автономный терминал</p>
            </div>
            <button class="primary" data-action="start">Запустить синхронизацию</button>
            <a class="download-link" href="https://disk.yandex.ru/d/E2Nf9uvCMgDwxw" target="_blank" rel="noopener">Скачать</a>
            <div class="status-row" aria-hidden="true">
              <div>Защита: Омега</div>
              <div>Канал: локальный оффлайн</div>
            </div>
          </section>
        `);
      }

      function renderBoot(durationMs) {
        state.screen = "boot";
        render(`
          <section class="screen panel boot" aria-label="Загрузка" style="--boot-duration:${durationMs}ms">
            <div class="boot-head">
              <span>Загрузка когнитивных массивов</span>
              <span class="cyan">LOCAL</span>
            </div>
            <div class="bar"><div class="bar-fill"></div></div>
            <div class="boot-progress">
              <span>ресурсы терминала</span>
              <span id="boot-percent">0%</span>
            </div>
            <div class="log">
              <div>Извлечение нейронных паттернов...</div>
              <div>Обход квантового шифрования...</div>
              <div>Подготовка буфера инъекции...</div>
              <div>Загрузка модулей сопоставления...</div>
            </div>
            <div class="hint">
              <strong class="cyan">i</strong>
              <span>Листайте буфер модулями и закройте все белые ячейки целевой матрицы. Выбранный модуль не должен попадать на белые клетки.</span>
            </div>
          </section>
        `);
      }

      function startBootSequence() {
        clearBootTimer();
        sfx.boot();
        const durationMs = 3000 + Math.floor(Math.random() * 2001);
        const startedAt = Date.now();
        let displayedPercent = 0;
        let holdUntil = 0;
        renderBoot(durationMs);

        state.bootTimer = setInterval(() => {
          const now = Date.now();
          const node = document.getElementById("boot-percent");
          const bar = document.querySelector(".bar-fill");
          const elapsedPercent = Math.floor(((now - startedAt) / durationMs) * 100);

          if (now >= holdUntil) {
            const jitter = Math.random() < 0.18 ? 0 : Math.floor(Math.random() * 7) + 1;
            const ceiling = Math.min(99, elapsedPercent + Math.floor(Math.random() * 12));
            displayedPercent = Math.min(ceiling, displayedPercent + jitter);
            if (Math.random() < 0.16) holdUntil = now + 180 + Math.random() * 460;
          }

          if (node) node.textContent = `${displayedPercent}%`;
          if (bar) bar.style.width = `${displayedPercent}%`;
        }, 120);

        setTimeout(() => {
          clearBootTimer();
          const node = document.getElementById("boot-percent");
          const bar = document.querySelector(".bar-fill");
          if (node) node.textContent = "100%";
          if (bar) bar.style.width = "100%";
          startGame();
        }, durationMs);
      }

      function startGame() {
        clearBootTimer();
        clearGameTimer();
        state.screen = "game";
        state.level = 0;
        state.timeLeft = 15;
        newLevel();
        state.timer = setInterval(() => {
          state.timeLeft = Math.max(0, state.timeLeft - 1);
          updateTimer();
          if (state.timeLeft <= 0) complete(false, "timeout");
        }, 1000);
      }

      function newLevel() {
        const solutionIndex = Math.floor(Math.random() * modules.length);
        const solution = modules[solutionIndex];
        state.target = solution.map((cell) => !cell);
        state.currentIndex = Math.floor(Math.random() * modules.length);
        state.applied = null;
        state.checking = false;
        renderGame();
      }

      function renderCells(cells, prefix, targetMode = false) {
        return cells.map((active, index) => {
          let klass = targetMode ? "target-cell" : "module-cell";
          if (active) klass += " on";
          if (targetMode && state.applied) {
            const applied = state.applied[index];
            if (!active && applied) klass += " fill";
            if (active && applied) klass += " overlap";
          }
          return `<div class="${klass}" data-cell="${prefix}-${index}"></div>`;
        }).join("");
      }

      function moduleMarkup(offset) {
        const index = (state.currentIndex + offset + modules.length) % modules.length;
        const klass = offset === -1 ? " prev" : offset === 1 ? " next" : "";
        return `<div class="module${klass}">${renderCells(modules[index], "module-" + index)}</div>`;
      }

      function renderDots() {
        return modules.map((_, index) => (
          `<span class="dot${index === state.currentIndex ? " active" : ""}"></span>`
        )).join("");
      }

      function renderCarouselContent() {
        return `
          ${moduleMarkup(-1)}
          ${moduleMarkup(0)}
          ${moduleMarkup(1)}
          <div class="counter">${state.currentIndex + 1}/${modules.length}</div>
        `;
      }

      function updateCarouselOnly() {
        const carousel = document.getElementById("carousel");
        const dots = document.getElementById("module-dots");
        if (carousel) carousel.innerHTML = renderCarouselContent();
        if (dots) dots.innerHTML = renderDots();
      }

      function renderGame() {
        render(`
          <section class="screen panel game" id="game-panel" aria-label="Игра сопоставления">
            <div class="game-head">
              <span>Синх ${state.level + 1}/${state.totalLevels}</span>
              <span id="timer" class="${state.timeLeft < 5 ? "danger" : ""}">Лимит: ${state.timeLeft}с</span>
            </div>

            <div>
              <div class="label"><span>Целевая матрица</span></div>
              <div class="matrix-wrap">
                <div class="matrix" id="target-matrix">${renderCells(state.target, "target", true)}</div>
              </div>
            </div>

            <div class="buffer-block">
              <div class="label"><span class="cyan">Буфер инъекции</span></div>
              <div class="selector">
                <button class="round" data-action="prev" ${state.checking ? "disabled" : ""} aria-label="Предыдущий модуль">‹</button>
                <div class="carousel" id="carousel">
                  ${renderCarouselContent()}
                </div>
                <button class="round" data-action="next" ${state.checking ? "disabled" : ""} aria-label="Следующий модуль">›</button>
              </div>
              <div class="dots" id="module-dots">${renderDots()}</div>
            </div>

            <button class="primary" data-action="inject" ${state.checking ? "disabled" : ""}>Синхронизировать</button>
            <div class="footer-note">Свайп влево/вправо переключает модули</div>
          </section>
        `);
      }

      function updateTimer() {
        const timer = document.getElementById("timer");
        if (!timer) return;
        timer.textContent = `Лимит: ${state.timeLeft}с`;
        timer.classList.toggle("danger", state.timeLeft < 5);
      }

      function select(delta) {
        if (state.checking || state.screen !== "game") return;
        state.currentIndex = (state.currentIndex + delta + modules.length) % modules.length;
        sfx.select();
        updateCarouselOnly();
      }

      function inject() {
        if (state.checking || state.screen !== "game") return;
        state.checking = true;
        sfx.click();
        state.applied = modules[state.currentIndex];
        renderGame();

        setTimeout(() => {
          if (state.screen !== "game") return;
          const correct = state.target.every((targetCell, index) => targetCell !== state.applied[index]);
          if (correct) {
            sfx.success();
            showFeedback("Модуль синхронизирован", "success");
            setTimeout(() => {
              if (state.screen !== "game") return;
              if (state.level >= state.totalLevels - 1) {
                complete(true);
              } else {
                state.level += 1;
                state.timeLeft += 5;
                newLevel();
              }
            }, 850);
          } else {
            sfx.glitch();
            state.timeLeft = Math.max(0, state.timeLeft - 3);
            updateTimer();
            showFeedback("Ошибка последовательности", "error");
            const panel = document.getElementById("game-panel");
            if (panel) panel.classList.add("shake");
            setTimeout(() => {
              if (state.screen !== "game") return;
              state.applied = null;
              state.checking = false;
              renderGame();
            }, 850);
          }
        }, 420);
      }

      function showFeedback(text, type) {
        const panel = document.getElementById("game-panel");
        if (!panel) return;
        panel.querySelector(".feedback")?.remove();
        panel.insertAdjacentHTML("beforeend", `<div class="feedback ${type === "success" ? "success-text" : "error-text"}">${text}</div>`);
      }

      function complete(success, reason = "") {
        if (state.screen === "result") return;
        clearGameTimer();
        state.screen = "result";
        state.checking = false;
        success ? sfx.success() : sfx.error();
        const isTimeout = reason === "timeout";

        const title = success
          ? `Синхронизация<br><span style="color:var(--green)">завершена</span>`
          : isTimeout
            ? `Время<br><span style="color:var(--red)">истекло</span>`
            : `Прорыв<br><span style="color:var(--red)">ядра</span>`;
        const text = success
          ? "Нейронная интеграция подтверждена. Протокол Перикота расшифрован."
          : isTimeout
            ? "Лимит синхронизации исчерпан. Терминал разорвал соединение."
            : "Трассировка запущена. Выполнено аварийное завершение.";
        const icon = success ? "✓" : "!";
        const colorClass = success ? "success-text" : "error-text";

        app.insertAdjacentHTML("beforeend", `
          <section class="result-overlay" aria-label="Результат">
            <div class="result">
              <div class="result-icon ${colorClass}">${icon}</div>
              <h2>${title}</h2>
              <p>${text}</p>
              <button class="ghost" data-action="reset">Вернуться в матрицу</button>
            </div>
          </section>
        `);
        bindControls();
      }

      function bindControls() {
        app.querySelectorAll("[data-action]").forEach((button) => {
          button.onclick = () => {
            switch (button.dataset.action) {
              case "start":
                startBootSequence();
                break;
              case "prev":
                select(-1);
                break;
              case "next":
                select(1);
                break;
              case "inject":
                inject();
                break;
              case "reset":
                renderIdle();
                break;
            }
          };
        });

        const carousel = document.getElementById("carousel");
        if (carousel) {
          carousel.ontouchstart = (event) => {
            state.touchX = event.changedTouches[0].clientX;
          };
          carousel.ontouchend = (event) => {
            const diff = event.changedTouches[0].clientX - state.touchX;
            if (Math.abs(diff) > 34) select(diff > 0 ? -1 : 1);
          };
        }
      }

      window.addEventListener("keydown", (event) => {
        if (state.screen !== "game") return;
        if (event.key === "ArrowLeft") select(-1);
        if (event.key === "ArrowRight") select(1);
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          inject();
        }
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden && state.audio?.state === "running") state.audio.suspend();
      });

      renderIdle();
    })();
  </script>
</body>
</html>
